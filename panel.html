<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel</title>

<style>
:root{
  --bg-light:#f5f7fa;
  --bg-dark:#0f172a;
  --card-light:rgba(255,255,255,0.6);
  --card-dark:rgba(15,23,42,0.6);
  --text-light:#1e293b;
  --text-dark:#f1f5f9;
  --border-light:rgba(0,0,0,0.2);
  --border-dark:rgba(255,255,255,0.2);
  --accent:#dc2626;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  height:100vh;
  display:none;
  justify-content:center;
  align-items:center;
  transition:0.4s;
}

body.light{background:var(--bg-light);color:var(--text-light);}
body.dark{background:var(--bg-dark);color:var(--text-dark);}

.panel-box{
  width:420px;
  padding:40px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
  position:relative;
  text-align:center;
}

body.light .panel-box{
  background:var(--card-light);
  border:1px solid var(--border-light);
}
body.dark .panel-box{
  background:var(--card-dark);
  border:1px solid var(--border-dark);
}

h2{
  margin-bottom:25px;
}

.status-buttons{
  display:flex;
  justify-content:space-between;
  gap:10px;
  margin-bottom:25px;
}

.status-btn{
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid black;
  background:transparent;
  cursor:pointer;
  transition:0.3s;
  font-weight:500;
}

body.dark .status-btn{
  border:1px solid white;
  color:white;
}

.status-btn.active{
  background:var(--accent);
  color:white;
  border:none;
}

.logout{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#333;
  color:white;
  cursor:pointer;
}

.switch{
  position:absolute;
  top:20px;
  right:20px;
}

.switch input{display:none;}

.slider{
  width:55px;
  height:28px;
  background:#ccc;
  border-radius:50px;
  position:relative;
  cursor:pointer;
  display:flex;
  align-items:center;
}

.slider:before{
  content:"☀️";
  position:absolute;
  width:24px;
  height:24px;
  border-radius:50%;
  top:2px;
  left:2px;
  background:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  transition:0.3s;
}

input:checked + .slider{
  background:#222;
}

input:checked + .slider:before{
  transform:translateX(27px);
  content:"🌙";
}
</style>
</head>

<body class="light">

<div class="panel-box">

<label class="switch">
<input type="checkbox" onclick="toggleMode()">
<div class="slider"></div>
</label>

<h2>Panel de Estado</h2>

<div class="status-buttons">
  <button class="status-btn" onclick="setStatus('Disponible', this)">Disponible</button>
  <button class="status-btn" onclick="setStatus('En servicio', this)">En servicio</button>
  <button class="status-btn" onclick="setStatus('No disponible', this)">No disponible</button>
</div>

<button class="logout" onclick="logout()">Cerrar sesión</button>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeMyqzeP7QFo3BTb5nB709RdkRgppXK1o",
  authDomain: "servicestatus-121343.firebaseapp.com",
  projectId: "servicestatus-121343",
  storageBucket: "servicestatus-121343.firebasestorage.app",
  messagingSenderId: "377414557056",
  appId: "1:377414557056:web:02ba4551c2ce1b1437f565"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

onAuthStateChanged(auth,(user)=>{
  if(user){
    document.body.style.display="flex";
    loadStatus();
  }else{
    window.location.href="login.html";
  }
});

window.setStatus = async function(status, element){
  await setDoc(doc(db,"grua","estado"),{
    status:status,
    timestamp:new Date()
  });

  document.querySelectorAll(".status-btn").forEach(btn=>{
    btn.classList.remove("active");
  });

  element.classList.add("active");
}

async function loadStatus(){
  const snap=await getDoc(doc(db,"grua","estado"));
  if(snap.exists()){
    const current=snap.data().status;
    document.querySelectorAll(".status-btn").forEach(btn=>{
      if(btn.innerText===current){
        btn.classList.add("active");
      }
    });
  }
}

window.logout=function(){
  signOut(auth).then(()=>{
    window.location.href="login.html";
  });
}
</script>

<script>
function toggleMode(){
  document.body.classList.toggle("dark");
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
