<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carbucr Admin</title>

<style>
:root{
  --bg-light: #f5f7fa;
  --bg-dark: #0f172a;
  --card-light: rgba(255,255,255,0.6);
  --card-dark: rgba(15,23,42,0.6);
  --text-light: #1e293b;
  --text-dark: #f1f5f9;
  --border-light: rgba(255,255,255,0.4);
  --border-dark: rgba(255,255,255,0.1);
  --accent: #6d28d9;
}

body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  transition:0.4s;
}

body.light{
  background: var(--bg-light);
  color: var(--text-light);
}

body.dark{
  background: var(--bg-dark);
  color: var(--text-dark);
}

.login-box{
  width:340px;
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  transition:0.4s;
  box-shadow: 0 20px 40px rgba(0,0,0,0.2);
}

body.light .login-box{
  background: var(--card-light);
  border:1px solid var(--border-light);
}

body.dark .login-box{
  background: var(--card-dark);
  border:1px solid var(--border-dark);
}

h2{
  text-align:center;
  margin-bottom:30px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:20px;
  border-radius:12px;
  border:none;
  outline:none;
  background: rgba(255,255,255,0.7);
  font-size:14px;
}

body.dark input{
  background: rgba(255,255,255,0.1);
  color:white;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background: var(--accent);
  color:white;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  opacity:0.9;
}

.toggle-mode{
  margin-top:20px;
  text-align:center;
  font-size:13px;
  cursor:pointer;
  opacity:0.7;
}

.toggle-mode:hover{
  opacity:1;
}

.error{
  color:red;
  font-size:13px;
  text-align:center;
  margin-bottom:10px;
}
</style>
</head>

<body class="light">

<div class="login-box">
  <h2>Carbucr Admin</h2>

  <div class="error" id="errorMsg"></div>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">
  <button onclick="login()">Ingresar</button>

  <div class="toggle-mode" onclick="toggleMode()">
    Cambiar a modo oscuro 🌙
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCeMyqzeP7QFo3BTb5nB709RdkRgppXK1o",
  authDomain: "servicestatus-121343.firebaseapp.com",
  projectId: "servicestatus-121343",
  storageBucket: "servicestatus-121343.firebasestorage.app",
  messagingSenderId: "377414557056",
  appId: "1:377414557056:web:02ba4551c2ce1b1437f565"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// Login function
window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const errorMsg = document.getElementById("errorMsg");

  signInWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
      window.location.href = "panel.html";
    })
    .catch((error) => {
      errorMsg.innerText = "Credenciales incorrectas";
    });
}

// Auto login
onAuthStateChanged(auth, (user) => {
  if (user) {
    window.location.href = "panel.html";
  }
});

</script>

<script>
function toggleMode(){
  const body = document.body;
  const toggle = document.querySelector('.toggle-mode');

  if(body.classList.contains('light')){
    body.classList.remove('light');
    body.classList.add('dark');
    toggle.innerHTML = "Cambiar a modo claro ☀️";
  }else{
    body.classList.remove('dark');
    body.classList.add('light');
    toggle.innerHTML = "Cambiar a modo oscuro 🌙";
  }
}
</script>

</body>
</html>
